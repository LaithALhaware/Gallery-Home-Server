<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gallery">
    <link rel="apple-touch-icon" href="static/Icon.svg">
    <link rel="icon" href="static/Icon.svg" type="image/svg+xml">
    <title>Gallery Home — Create account</title>

    <script>
    (function() {
        try {
            const saved = localStorage.getItem('gallery-theme') || 'auto';
            document.documentElement.setAttribute('data-theme', saved);
        } catch (e) {
            document.documentElement.setAttribute('data-theme', 'auto');
        }
    })();
    </script>

    <style>
    :root {
        --bg:            #f2f2f7;
        --surface:       #ffffff;
        --surface-2:     #f9f9fb;
        --border:        rgba(0, 0, 0, 0.08);
        --border-strong: rgba(0, 0, 0, 0.14);
        --text:          #1c1c1e;
        --text-2:        #6e6e73;
        --text-3:        #8e8e93;
        --accent:        #007aff;
        --accent-hover:  #0062cc;
        --danger:        #ff3b30;
        --danger-hover:  #d70015;
        --success:       #34c759;
        --warning:       #ff9500;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --radius-xl: 28px;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
        --shadow-lg: 0 12px 32px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html[data-theme="dark"] {
        --bg:            #000000;
        --surface:       #1c1c1e;
        --surface-2:     #2c2c2e;
        --border:        rgba(255, 255, 255, 0.10);
        --border-strong: rgba(255, 255, 255, 0.18);
        --text:          #ffffff;
        --text-2:        #ebebf599;
        --text-3:        #ebebf580;
    }
    @media (prefers-color-scheme: dark) {
        html[data-theme="auto"] {
            --bg:            #000000;
            --surface:       #1c1c1e;
            --surface-2:     #2c2c2e;
            --border:        rgba(255, 255, 255, 0.10);
            --border-strong: rgba(255, 255, 255, 0.18);
            --text:          #ffffff;
            --text-2:        #ebebf599;
            --text-3:        #ebebf580;
        }
    }

    * { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 16px;
        line-height: 1.4;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(var(--safe-top) + 72px) 16px calc(var(--safe-bot) + 16px);
        position: relative;
        text-transform: capitalize;
    }
    button, input { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ---------- BACKGROUND GALLERY ---------- */
    .bg-gallery {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
    }

    .gallery-line {
        position: absolute;
        display: flex;
        gap: 8px;
        white-space: nowrap;
    }
    .gallery-line img {
        width: 60px; height: 60px;
        object-fit: cover;
        border-radius: var(--radius-sm);
        /* filter: blur(2px); */
    }
    @keyframes scroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
    }
    .bg-gallery::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center,
                    transparent 0%,
                    color-mix(in srgb, var(--bg) 60%, transparent) 70%,
                    var(--bg) 100%);
    }

    /* ---------- THEME PICKER ---------- */
    .theme-picker {
        position: fixed;
        top: calc(var(--safe-top) + 16px);
        right: 16px;
        z-index: 10;
        display: flex;
        gap: 4px;
        padding: 4px;
        background: color-mix(in srgb, var(--surface) 80%, transparent);
        backdrop-filter: saturate(180%) blur(24px);
        -webkit-backdrop-filter: saturate(180%) blur(24px);
        border: 1px solid var(--border);
        border-radius: 999px;
        box-shadow: var(--shadow-sm);
    }
    .theme-picker__btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px; height: 36px;
        background: transparent;
        border: none;
        border-radius: 999px;
        color: var(--text-2);
        cursor: pointer;
        transition: background 0.2s ease, color 0.2s ease;
        -webkit-tap-highlight-color: transparent;
    }
    .theme-picker__btn svg { width: 18px; height: 18px; }
    .theme-picker__btn:hover { color: var(--text); }
    .theme-picker__btn.is-active {
        background: var(--surface);
        color: var(--accent);
        box-shadow: var(--shadow-sm);
    }

    /* ---------- BACK BUTTON (top-left) ---------- */
    .back-btn {
        position: fixed;
        top: calc(var(--safe-top) + 16px);
        left: 16px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px; height: 44px;
        background: color-mix(in srgb, var(--surface) 80%, transparent);
        backdrop-filter: saturate(180%) blur(24px);
        -webkit-backdrop-filter: saturate(180%) blur(24px);
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text);
        cursor: pointer;
        transition: background 0.2s ease;
        box-shadow: var(--shadow-sm);
    }
    .back-btn:hover { background: var(--surface); }
    .back-btn:active { transform: scale(0.95); }
    .back-btn svg { width: 20px; height: 20px; }

    /* ---------- SIGNUP CARD ---------- */
    .card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 420px;
        padding: 32px 24px;
        background: color-mix(in srgb, var(--surface) 80%, transparent);
        backdrop-filter: saturate(180%) blur(24px);
        -webkit-backdrop-filter: saturate(180%) blur(24px);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        text-align: center;
        animation: cardIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes cardIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @media (min-width: 640px) {
        .card { padding: 40px 32px; }
    }

    .logo {
        display: flex;
        justify-content: center;
        margin-bottom: 16px;
    }
    .logo img { width: 72px; height: 72px; }

    h1 {
        margin: 0 0 4px;
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
    }
    .subtitle {
        margin: 0 0 24px;
        font-size: 14px;
        color: var(--text-2);
        font-weight: 500;
    }

    /* ---------- FORM ---------- */
    form {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }
    .input-group { position: relative; }
    .input-group input {
        width: 100%;
        height: 52px;
        padding: 0 14px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 16px;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .input-group input::placeholder { color: transparent; }
    .input-group input:focus {
        border-color: var(--accent);
        background: var(--surface);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    .input-group input.is-invalid {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 18%, transparent);
    }
    .input-group label {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        padding: 0 4px;
        background: transparent;
        font-size: 15px;
        color: var(--text-3);
        pointer-events: none;
        transition: top 0.2s ease, font-size 0.2s ease, color 0.2s ease, background 0.2s ease;
    }
    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
        top: 0;
        transform: translateY(-50%);
        font-size: 12px;
        color: var(--accent);
        background: var(--surface);
        font-weight: 600;
        border-radius: var(--radius-sm);
    }
    .input-group input.is-invalid:focus + label,
    .input-group input.is-invalid:not(:placeholder-shown) + label { color: var(--danger); }

    .toggle-pass {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        padding: 6px 10px;
        background: transparent;
        border: none;
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 6px;
        -webkit-tap-highlight-color: transparent;
    }
    .toggle-pass:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
    .toggle-pass:active { transform: translateY(-50%) scale(0.96); }

    .field-hint {
        margin: 4px 4px 0;
        font-size: 12px;
        color: var(--text-3);
        text-align: left;
    }
    .field-hint.is-error { color: var(--danger); font-weight: 500; }

    /* ---------- PASSWORD STRENGTH ---------- */
    .strength {
        display: none;
        margin-top: 6px;
    }
    .strength.is-visible { display: block; }
    .strength__track {
        display: flex;
        gap: 4px;
        height: 4px;
        margin-bottom: 6px;
    }
    .strength__seg {
        flex: 1;
        background: var(--border);
        border-radius: 999px;
        transition: background 0.2s ease;
    }
    .strength__label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-3);
        text-align: left;
    }
    .strength[data-level="1"] .strength__seg:nth-child(-n+1),
    .strength[data-level="1"] .strength__label { color: var(--danger); }
    .strength[data-level="1"] .strength__seg:nth-child(-n+1) { background: var(--danger); }

    .strength[data-level="2"] .strength__seg:nth-child(-n+2),
    .strength[data-level="2"] .strength__label { color: var(--warning); }
    .strength[data-level="2"] .strength__seg:nth-child(-n+2) { background: var(--warning); }

    .strength[data-level="3"] .strength__seg:nth-child(-n+3),
    .strength[data-level="3"] .strength__label { color: var(--accent); }
    .strength[data-level="3"] .strength__seg:nth-child(-n+3) { background: var(--accent); }

    .strength[data-level="4"] .strength__seg,
    .strength[data-level="4"] .strength__label { color: var(--success); }
    .strength[data-level="4"] .strength__seg { background: var(--success); }

    /* ---------- TERMS CHECKBOX ---------- */
    .terms {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 4px 0;
        text-align: left;
    }
    .terms input[type="checkbox"] {
        flex-shrink: 0;
        appearance: none;
        -webkit-appearance: none;
        width: 20px; height: 20px;
        margin: 1px 0 0;
        background: var(--surface-2);
        border: 1.5px solid var(--border-strong);
        border-radius: 6px;
        cursor: pointer;
        position: relative;
        transition: background 0.2s ease, border-color 0.2s ease;
    }
    .terms input[type="checkbox"]:checked {
        background: var(--accent);
        border-color: var(--accent);
    }
    .terms input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 5px; top: 1px;
        width: 6px; height: 11px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }
    .terms label {
        font-size: 13px;
        color: var(--text-2);
        line-height: 1.4;
        cursor: pointer;
    }
    .terms label a {
        color: var(--accent);
        font-weight: 600;
    }
    .terms label a:hover { color: var(--accent-hover); }

    /* ---------- BUTTONS ---------- */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        height: 52px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s ease, background-color 0.2s ease;
        -webkit-appearance: none;
        appearance: none;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn:disabled {
        background: var(--text-3);
        cursor: not-allowed;
        opacity: 0.6;
    }
    .btn.loading { opacity: 0.7; pointer-events: none; }
    .btn .spinner {
        width: 18px; height: 18px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
    }
    .btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-top: 4px;
    }

    .signin-link {
        display: block;
        text-align: center;
        font-size: 14px;
        color: var(--text-2);
        font-weight: 500;
    }
    .signin-link a {
        color: var(--accent);
        font-weight: 600;
        margin-left: 4px;
        transition: color 0.2s ease;
    }
    .signin-link a:hover { color: var(--accent-hover); }
    .signin-link a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: 4px;
    }

    /* ---------- ERROR ---------- */
    .error {
        margin-top: 14px;
        padding: 10px 14px;
        background: color-mix(in srgb, var(--danger) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
        color: var(--danger);
        font-size: 14px;
        font-weight: 500;
        border-radius: var(--radius-sm);
        text-align: left;
    }
    </style>
</head>

<body>

    <div class="bg-gallery" id="bgGallery" aria-hidden="true"></div>

    <!-- Back button -->
    <a href="/" class="back-btn" aria-label="Back to sign in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
    </a>

    <!-- Theme picker -->
    <div class="theme-picker" role="radiogroup" aria-label="Theme">
        <button type="button" class="theme-picker__btn" data-theme-value="auto" title="Auto" aria-label="Automatic theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/>
            </svg>
        </button>
        <button type="button" class="theme-picker__btn" data-theme-value="light" title="Light" aria-label="Light theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
        </button>
        <button type="button" class="theme-picker__btn" data-theme-value="dark" title="Dark" aria-label="Dark theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>

    <main class="card">
        <div class="logo"><img src="static/Icon.svg" alt="Gallery"></div>
        <h1>Create your account</h1>
        <p class="subtitle">Get started with Gallery Home</p>

        <form method="POST" action="/signup" id="signupForm" onsubmit="return handleSignup(event)" novalidate>
            <div class="input-group">
                <input type="text" id="username" name="username" required placeholder=" "
                       autocomplete="username" minlength="3" maxlength="20"
                       pattern="[a-zA-Z0-9_]+">
                <label for="username">Username</label>
            </div>
            <p class="field-hint" id="username-hint">3–20 characters · letters, numbers, underscores</p>

            <div class="input-group">
                <input type="email" id="email" name="email" required placeholder=" " autocomplete="email">
                <label for="email">Email</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" required placeholder=" "
                       autocomplete="new-password" minlength="8">
                <label for="password">Password</label>
                <button type="button" class="toggle-pass" data-target="password" aria-label="Show password">Show</button>
            </div>
            <div class="strength" id="strength" aria-live="polite">
                <div class="strength__track">
                    <div class="strength__seg"></div>
                    <div class="strength__seg"></div>
                    <div class="strength__seg"></div>
                    <div class="strength__seg"></div>
                </div>
                <div class="strength__label" id="strength-label">Too weak</div>
            </div>

            <div class="input-group">
                <input type="password" id="confirm" name="confirm" required placeholder=" "
                       autocomplete="new-password" minlength="8">
                <label for="confirm">Confirm password</label>
                <button type="button" class="toggle-pass" data-target="confirm" aria-label="Show password">Show</button>
            </div>
            <p class="field-hint" id="confirm-hint" style="display:none;"></p>

            <div class="terms">
                <input type="checkbox" id="agree" name="agree" required>
                <label for="agree">
                    I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>
                </label>
            </div>

            <div class="btn-stack">
                <button id="signupBtn" type="submit" class="btn">
                    <span class="spinner"></span>
                    <span class="btn-label">Create account</span>
                </button>

                <p class="signin-link">
                    Already have an account?<a href="/">Sign in</a>
                </p>
            </div>
        </form>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error" role="alert">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
    </main>

    <script>
        // Password show/hide (works for both fields)
        document.querySelectorAll('.toggle-pass').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                const isHidden = target.type === 'password';
                target.type = isHidden ? 'text' : 'password';
                btn.innerText = isHidden ? 'Hide' : 'Show';
                btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            });
        });

        // Password strength meter
        const passwordInput = document.getElementById('password');
        const strength = document.getElementById('strength');
        const strengthLabel = document.getElementById('strength-label');
        const STRENGTH_LABELS = ['Too weak', 'Weak', 'Fair', 'Good', 'Strong'];

        function scorePassword(pw) {
            if (!pw) return 0;
            let score = 0;
            if (pw.length >= 8)  score++;
            if (pw.length >= 12) score++;
            if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
            if (/\d/.test(pw)) score++;
            if (/[^a-zA-Z0-9]/.test(pw)) score++;
            return Math.min(4, Math.max(1, score - 1));
        }

        passwordInput.addEventListener('input', () => {
            const pw = passwordInput.value;
            if (!pw) {
                strength.classList.remove('is-visible');
                strength.removeAttribute('data-level');
                return;
            }
            const level = scorePassword(pw);
            strength.classList.add('is-visible');
            strength.setAttribute('data-level', level);
            strengthLabel.innerText = STRENGTH_LABELS[level];
            checkConfirm();
        });

        // Confirm password matching
        const confirmInput = document.getElementById('confirm');
        const confirmHint = document.getElementById('confirm-hint');

        function checkConfirm() {
            if (!confirmInput.value) {
                confirmHint.style.display = 'none';
                confirmInput.classList.remove('is-invalid');
                return true;
            }
            if (confirmInput.value !== passwordInput.value) {
                confirmHint.style.display = 'block';
                confirmHint.classList.add('is-error');
                confirmHint.innerText = 'Passwords don\u2019t match';
                confirmInput.classList.add('is-invalid');
                return false;
            }
            confirmHint.style.display = 'block';
            confirmHint.classList.remove('is-error');
            confirmHint.style.color = 'var(--success)';
            confirmHint.innerText = '\u2713 Passwords match';
            confirmInput.classList.remove('is-invalid');
            return true;
        }
        confirmInput.addEventListener('input', checkConfirm);

        // Username validation hint
        const usernameInput = document.getElementById('username');
        const usernameHint = document.getElementById('username-hint');
        usernameInput.addEventListener('input', () => {
            const v = usernameInput.value;
            if (!v) {
                usernameHint.classList.remove('is-error');
                usernameHint.innerText = '3\u201320 characters \u00b7 letters, numbers, underscores';
                usernameInput.classList.remove('is-invalid');
                return;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(v)) {
                usernameHint.classList.add('is-error');
                usernameHint.innerText = 'Only letters, numbers, and underscores allowed';
                usernameInput.classList.add('is-invalid');
            } else if (v.length < 3) {
                usernameHint.classList.add('is-error');
                usernameHint.innerText = 'Must be at least 3 characters';
                usernameInput.classList.add('is-invalid');
            } else {
                usernameHint.classList.remove('is-error');
                usernameHint.innerText = '\u2713 Looks good';
                usernameHint.style.color = 'var(--success)';
                usernameInput.classList.remove('is-invalid');
            }
        });

        // Submit handler with client-side validation
        function handleSignup(e) {
            const pw = passwordInput.value;
            const confirm = confirmInput.value;

            if (pw !== confirm) {
                e.preventDefault();
                checkConfirm();
                confirmInput.focus();
                return false;
            }
            if (pw.length < 8) {
                e.preventDefault();
                alert('Password must be at least 8 characters');
                passwordInput.focus();
                return false;
            }

            const btn = document.getElementById('signupBtn');
            const label = btn.querySelector('.btn-label');
            btn.classList.add('loading');
            label.innerText = 'Creating account…';
            return true;
        }

        // Theme picker (matches gallery & login)
        function applyTheme(value) {
            document.documentElement.setAttribute('data-theme', value);
            try { localStorage.setItem('gallery-theme', value); } catch (e) {}
            document.querySelectorAll('.theme-picker__btn').forEach(btn => {
                btn.classList.toggle('is-active', btn.dataset.themeValue === value);
            });
        }
        (function initTheme() {
            let saved = 'auto';
            try { saved = localStorage.getItem('gallery-theme') || 'auto'; } catch (e) {}
            applyTheme(saved);
            document.querySelectorAll('.theme-picker__btn').forEach(btn => {
                btn.addEventListener('click', () => applyTheme(btn.dataset.themeValue));
            });
        })();

        // Background gallery
        const bgGallery = document.getElementById('bgGallery');
        function createGallery() {
            bgGallery.innerHTML = '';
            const lineHeight = 68;
            const linesCount = Math.ceil(window.innerHeight / lineHeight) + 1;
            const imagesPerLine = Math.ceil(window.innerWidth / 68) + 1;
            for (let i = 0; i < linesCount; i++) {
                const line = document.createElement('div');
                line.className = 'gallery-line';
                line.style.top = `${i * lineHeight}px`;
                const speed = 100 + Math.random() * 20;
                const direction = i % 2 === 0 ? 'normal' : 'reverse';
                line.style.animation = `scroll ${speed}s linear infinite ${direction}`;
                for (let j = 0; j < imagesPerLine * 2; j++) {
                    const img = document.createElement('img');
                    const randomId = Math.floor(Math.random() * 1000);
                    img.src = `https://picsum.photos/seed/${randomId}/60/60`;
                    img.loading = 'lazy';
                    img.alt = '';
                    line.appendChild(img);
                }
                bgGallery.appendChild(line);
            }
        }
        createGallery();
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(createGallery, 200);
        });
    </script>

</body>
</html>
